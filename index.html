<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi App de Teams</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6264A7, #7B83EB);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    h1 {
      color: #252525;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .status-box {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #22C55E;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text {
      color: #1E40AF;
      font-weight: 600;
      font-size: 14px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .info-item {
      background: #F9FAFB;
      border-radius: 8px;
      padding: 14px;
      text-align: left;
    }
    .info-label { color: #999; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-value { color: #252525; font-weight: 600; font-size: 15px; margin-top: 4px; }
    .btn {
      background: #6264A7;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4F51A3; }
    .footer {
      margin-top: 24px;
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🚀</div>
    <h1>¡HOLA PAU!!! App de Teams funcionando!</h1>
    <p class="subtitle">Esta es una pestaña personalizada dentro de Microsoft Teams</p>

    <div class="status-box">
      <span class="status-dot"></span>
      <span class="status-text" id="teamsStatus">Conectando con Teams SDK...</span>
    </div>

    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Usuario</div>
        <div class="info-value" id="userName">Cargando...</div>
      </div>
      <div class="info-item">
        <div class="info-label">Contexto</div>
        <div class="info-value" id="teamsContext">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">Tema</div>
        <div class="info-value" id="teamsTheme">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">Versión</div>
        <div class="info-value">1.0.0</div>
      </div>
    </div>

    <button class="btn" onclick="sendNotification()">🔔 Enviar notificación test</button>

    <div class="footer">App de prueba · Creada para demostrar Teams Apps</div>
  </div>

  <script>
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.app.getContext().then(context => {
        document.getElementById('teamsStatus').textContent = '✅ Conectado a Microsoft Teams';
        document.getElementById('userName').textContent = context.user?.displayName || 'Teams User';
        document.getElementById('teamsContext').textContent = context.page?.frameContext || 'Personal';
        document.getElementById('teamsTheme').textContent = context.app?.theme || 'default';
      });
    }).catch(() => {
      document.getElementById('teamsStatus').textContent = '⚠️ Ejecutando fuera de Teams';
      document.getElementById('userName').textContent = 'Demo User';
      document.getElementById('teamsContext').textContent = 'Browser';
      document.getElementById('teamsTheme').textContent = 'light';
    });

    function sendNotification() {
      alert('✅ ¡Notificación enviada! En producción, aquí podrías enviar mensajes al chat de Teams via Bot Framework o webhooks.');
    }
  </script>
</body>
</html>
