<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Día · Teams Dashboard</title>

  <!-- CSP SEGURA PARA GITHUB PAGES -->
  <meta http-equiv="Content-Security-Policy"
  content="
  default-src 'self';
  script-src 'self' https://alcdn.msauth.net;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
  connect-src https://graph.microsoft.com https://login.microsoftonline.com;
  img-src 'self' data:;
  base-uri 'self';
  form-action 'self';
  ">

  <!-- MSAL -->
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

</head>

<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-card">
      <h2>Mi Día · Teams</h2>
      <p>Inicia sesión con tu cuenta Microsoft.</p>

      <button class="login-btn" onclick="doLogin()">
        Continuar con Microsoft
      </button>

      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loadingOverlay" style="display:none;">
    <p id="loadingText">Cargando…</p>
  </div>

  <!-- APP -->
  <div id="appShell" style="display:none;">
    <header>
      <span>Mi Día</span>
      <button onclick="doLogout()">Cerrar sesión</button>
    </header>

    <main>
      <h1 id="greetingText">Cargando…</h1>
      <div id="meetingsList"></div>
      <div id="tasksList"></div>
      <div id="mailList"></div>
    </main>
  </div>

  <!-- SCRIPT EXTERNO (OBLIGATORIO PARA CSP) -->
  <script src="app.js"></script>

</body>
</html>
